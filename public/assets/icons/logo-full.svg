<svg width="460" height="150" viewBox="0 0 460 150" xmlns="http://www.w3.org/2000/svg">

  <!-- Logo icon block -->
  <g transform="translate(40,40)">
    <!-- Icon background -->
    <rect x="-40" y="-40" width="120" height="120" rx="16" fill="#FFFFFF" stroke="#1C8C7C" stroke-width="2"/>

    <!-- Outer circle -->
    <circle cx="20" cy="20" r="32" fill="#E6F5F2" stroke="#1C8C7C" stroke-width="3"/>

    <!-- Cross -->
    <rect x="12" y="-2" width="16" height="44" rx="3" fill="#1C8C7C"/>
    <rect x="-2" y="12" width="44" height="16" rx="3" fill="#1C8C7C"/>

    <!-- Connection dots -->
    <circle cx="46" cy="2" r="4" fill="#1C8C7C"/>
    <circle cx="-6" cy="38" r="4" fill="#1C8C7C"/>
  </g>

  <!-- Brand text OUTSIDE the logo background -->
  <text x="150" y="70" font-family="Segoe UI, system-ui, sans-serif" font-size="48" fill="#1C8C7C">
    CareSync
    <tspan font-weight="700" fill="#1C3B4D">360</tspan>
  </text>

  

</svg>
